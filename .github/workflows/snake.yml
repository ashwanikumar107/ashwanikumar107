name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate dark snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ashwanikumar107
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=blue&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
